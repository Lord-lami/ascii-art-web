<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Terminal View</title>
  <style>
    body {
      margin: 0;
      background-color: #111;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .terminal {
      background-color: #000;
      color: #00ff00;
      font-family: monospace;
      padding: 20px;
      border-radius: 6px;
      width: 80%;
      max-width: 800px;
      height: 400px;
      overflow-y: auto;
      white-space: pre; /* preserves formatting */
      box-shadow: 0 0 10px rgba(0, 255, 0, 0.3);
    }

    /* Optional blinking cursor */
    .cursor {
      display: inline-block;
      width: 10px;
      background-color: #00ff00;
      margin-left: 5px;
      animation: blink 1s steps(2, start) infinite;
    }

    @keyframes blink {
      to {
        visibility: hidden;
      }
    }
  </style>
</head>
<body>

  <div class="terminal">
{{printf "%s" .}}
<span class="cursor"></span>
  </div>

</body>
</html>
